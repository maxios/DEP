name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: |
          cd cli && bun install
          if find . -name '*.test.*' -o -name '*.spec.*' | grep -q .; then
            bun test
          else
            echo "No test files found, skipping"
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd cli && bun install && bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: cli/dist/dep-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/dep-*
            install.sh
          generate_release_notes: true
